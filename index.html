<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Operacional de Leitos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="dados.js"></script>
<style>
:root{--bg:#0a0e17;--card:#111827;--surf:#1e293b;--brd:#1e293b;--brd2:#334155;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--red:#ef4444;--redD:rgba(239,68,68,.15);--org:#f59e0b;--orgD:rgba(245,158,11,.15);--grn:#10b981;--grnD:rgba(16,185,129,.15);--blu:#3b82f6;--bluD:rgba(59,130,246,.15);--pur:#8b5cf6;--purD:rgba(139,92,246,.15);--cyn:#06b6d4;--cynD:rgba(6,182,212,.15);--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--brd);background:linear-gradient(180deg,rgba(17,24,39,.95),var(--bg));position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo-img{height:48px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,212,255,.15));mix-blend-mode:lighten}
.hdr-t{font-size:17px;font-weight:600}.hdr-s{font-size:11px;color:var(--t3);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--t2)}
.dot{width:8px;height:8px;background:var(--grn);border-radius:50%;animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.nav{display:flex;gap:3px;padding:10px 28px;border-bottom:1px solid var(--brd);background:var(--bg);overflow-x:auto}
.nb{padding:9px 18px;border:none;background:0;color:var(--t3);font-family:inherit;font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;transition:all .2s;white-space:nowrap;position:relative}
.nb:hover{color:var(--t2);background:var(--card)}.nb.on{color:var(--t1);background:var(--card)}.nb.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--blu);border-radius:2px}
.fb{display:flex;align-items:center;gap:14px;padding:10px 28px;border-bottom:1px solid var(--brd);background:rgba(17,24,39,.8);flex-wrap:wrap}
.fg{display:flex;align-items:center;gap:7px}.fl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.fs{background:var(--surf);border:1px solid var(--brd2);color:var(--t1);font-family:inherit;font-size:13px;padding:7px 30px 7px 10px;border-radius:var(--rs);cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;min-width:150px}
.fs:focus{outline:none;border-color:var(--blu)}.fr{background:0;border:1px solid var(--brd2);color:var(--t3);font-family:inherit;font-size:11px;padding:7px 12px;border-radius:var(--rs);cursor:pointer}.fr:hover{color:var(--t2)}.fi{font-size:11px;color:var(--t3);margin-left:auto;font-family:'JetBrains Mono',monospace}
.mn{padding:20px 28px;max-width:1440px;margin:0 auto}.pg{display:none;animation:fi .3s ease}.pg.on{display:block}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.cr{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}.g31{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:20px}.fw{margin-bottom:20px}
.kc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all .2s}
.kc:hover{border-color:var(--brd2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc.red::before{background:var(--red)}.kc.org::before{background:var(--org)}.kc.grn::before{background:var(--grn)}.kc.blu::before{background:var(--blu)}.kc.pur::before{background:var(--pur)}.kc.cyn::before{background:var(--cyn)}
.kl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:8px}
.kv{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;letter-spacing:-1px;line-height:1}.ks{font-size:11px;color:var(--t3);margin-top:6px}.ki{position:absolute;top:14px;right:14px;font-size:18px;opacity:.4}
.pn{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--brd)}
.pt{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}.pb{font-size:10px;font-weight:500;padding:3px 7px;border-radius:16px;background:var(--bluD);color:var(--blu)}.pp{padding:18px}
table.dt{width:100%;border-collapse:collapse;font-size:12px}.dt th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);border-bottom:1px solid var(--brd)}
.dt td{padding:10px;border-bottom:1px solid rgba(30,41,59,.4);vertical-align:middle}.dt tr:hover td{background:rgba(30,41,59,.25)}
.dt th.ct,.dt td.ct{text-align:center}.dt th.rt,.dt td.rt{text-align:right}
.m{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}.rt{text-align:right}
.bd{display:inline-flex;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.bd.cr2{background:var(--redD);color:var(--red)}.bd.wr{background:var(--orgD);color:var(--org)}.bd.gd{background:var(--grnD);color:var(--grn)}.bd.in{background:var(--bluD);color:var(--blu)}
.bc{display:flex;flex-direction:column;gap:10px}
.br{display:grid;grid-template-columns:200px 1fr 55px;align-items:center;gap:10px}
.bl{font-size:11px;font-weight:500;color:var(--t2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt{height:26px;background:var(--surf);border-radius:5px;overflow:hidden}.bf{height:100%;border-radius:5px;transition:width .8s ease}
.bf.red{background:linear-gradient(90deg,var(--red),#dc2626)}.bf.org{background:linear-gradient(90deg,var(--org),#d97706)}.bf.grn{background:linear-gradient(90deg,var(--grn),#059669)}.bf.blu{background:linear-gradient(90deg,var(--blu),#2563eb)}.bf.pur{background:linear-gradient(90deg,var(--pur),#7c3aed)}.bf.cyn{background:linear-gradient(90deg,var(--cyn),#0891b2)}
.bv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--t2)}
.dc{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}.dl{display:flex;flex-direction:column;gap:8px}.li{display:flex;align-items:center;gap:8px;font-size:12px}.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.ib{padding:12px 16px;border-radius:var(--rs);background:var(--surf);border:1px solid var(--brd);font-size:11px;color:var(--t2);line-height:1.7;margin-bottom:14px}.ib strong{color:var(--t1)}
.ins{padding:14px;border-radius:var(--rs);border-left:3px solid;margin-bottom:10px}.ins-t{font-size:12px;font-weight:600;margin-bottom:3px}.ins-x{font-size:11px;color:var(--t2)}
.as{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--redD);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);font-size:12px;margin-bottom:14px}
.hl{color:var(--org)}.hl2{color:var(--cyn)}.hl3{color:var(--red)}
@media(max-width:1024px){.g2,.g31{grid-template-columns:1fr}.mn{padding:14px}.hdr,.nav,.fb{padding-left:14px;padding-right:14px}.br{grid-template-columns:140px 1fr 50px}}
@media(max-width:768px){.cr{grid-template-columns:repeat(2,1fr)}.kv{font-size:20px}}
</style>
</head>

<script>
const F=typeof DADOS!=='undefined'?DADOS:null;
if(!F)document.body.innerHTML='<div style="color:var(--red);padding:40px;font-size:18px">dados.js não encontrado.</div>';
let cM=F.mes_atual,cP='oficial',cS='todos';
function D(){return F.por_mes[cM]}
function gS(){let s=D().setores;if(cP==='oficial')s=s.filter(x=>x.grupo==='oficial');else if(cP==='apoio')s=s.filter(x=>x.grupo==='apoio');if(cS!=='todos')s=s.filter(x=>x.setor===cS);return s}
function gK(){const s=gS();if(cS!=='todos'&&s.length===1){const f=s[0];return{ocupacao_oficial_pct:f.pct_ocupacao_oficial,leitos_oficiais:f.oficiais,media_ocupados:f.media_ocupados,alertas_24h:f.alertas_24h,interditados_dias:f.qtd_interditados_dias}}
const d=D();if(cP==='oficial')return d.oficial.kpis;if(cP==='apoio')return d.apoio.kpis;
const a=d.oficial.kpis,b=d.apoio.kpis,t=a.leitos_oficiais+b.leitos_oficiais,m=a.media_ocupados+b.media_ocupados;
return{ocupacao_oficial_pct:t?Math.round(m/t*1000)/10:0,leitos_oficiais:t,media_ocupados:m,alertas_24h:a.alertas_24h+b.alertas_24h,interditados_dias:a.interditados_dias+b.interditados_dias}}
function gP(){const d=D();return cP==='apoio'?d.apoio.pizza:d.oficial.pizza}
function gOD(){if(cS!=='todos'){const s=gS();if(s.length===1){const o=s[0].oficiais||1;return s[0].ocup_diaria.map(x=>({data:x.data,dia:+x.data.split('-')[2],ocupados:x.ocupados,pct_oficial:Math.round(x.ocupados/o*1000)/10}))}}
const d=D();return cP==='apoio'?d.apoio.ocup_diaria:d.oficial.ocup_diaria}
function fm(n,d=1){return n!=null?n.toFixed(d).replace('.',','):'-'}
function fH(h){if(!h&&h!==0)return'-';const s=Math.floor(h),m=Math.round((h-s)*60);return String(s).padStart(2,'0')+':'+String(m).padStart(2,'0')}
function bc(p){return p>=100?'cr2':p>=90?'wr':p>=80?'in':'gd'}
function sl(p){return p>=100?'Superlotado':p>=95?'Pressão Alta':p>=80?'Controlado':'Confortável'}
function brc(p,m){const r=p/m;return r>.8?'red':r>.6?'org':r>.4?'blu':'cyn'}
function sp(id,b){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.nb').forEach(n=>n.classList.remove('on'));document.getElementById(id).classList.add('on');b.classList.add('on')}
function iF(){const m=document.getElementById('fm');F.meses_disponiveis.forEach(x=>{const o=document.createElement('option');o.value=x.chave;o.textContent=x.label;if(x.chave===F.mes_atual)o.selected=true;m.appendChild(o)});rSF()}
function rSF(){const e=document.getElementById('fse'),pv=e.value;e.innerHTML='<option value="todos">Todos os Setores</option>';F.setores_filtro.filter(s=>{if(cP==='oficial')return s.grupo==='oficial';if(cP==='apoio')return s.grupo==='apoio';return true}).forEach(s=>{const o=document.createElement('option');o.value=s.setor;o.textContent=s.setor;e.appendChild(o)});if([...e.options].some(o=>o.value===pv))e.value=pv;else{e.value='todos';cS='todos'}}
function fc(){cM=document.getElementById('fm').value;const np=document.getElementById('fp').value;if(np!==cP){cP=np;rSF()}cS=document.getElementById('fse').value;document.getElementById('finfo').textContent=D().periodo.inicio+' a '+D().periodo.fim;rA()}
function rf(){document.getElementById('fm').value=F.mes_atual;document.getElementById('fp').value='oficial';document.getElementById('fse').value='todos';cM=F.mes_atual;cP='oficial';cS='todos';rSF();fc()}
function rA(){r1();r2();r3();r4();r5()}

// P1 SITUACAO
function r1(){const s=gS(),k=gK(),p=gP();
const tA=s.reduce((a,b)=>a+b.alertas_24h,0);const top=[...s].filter(x=>x.alertas_24h>0).sort((a,b)=>b.alertas_24h-a.alertas_24h).slice(0,3);
let h='';if(tA>0)h+='<div class="as">⚠️ <span><strong>'+tA+'</strong> leitos liberados >24h — '+top.map(x=>'<strong>'+x.setor+'</strong> ('+x.alertas_24h+')').join(', ')+'</span></div>';
h+='<div class="cr"><div class="kc red"><div class="kl">Ocupação Oficial</div><div class="kv" style="color:var(--red)">'+fm(k.ocupacao_oficial_pct)+'%</div><div class="ks">'+k.leitos_oficiais+' leitos</div><div class="ki">🏥</div></div>'
+'<div class="kc blu"><div class="kl">Ocupados (média)</div><div class="kv" style="color:var(--blu)">'+Math.round(k.media_ocupados)+'</div><div class="ks">por dia</div><div class="ki">🛏️</div></div>'
+'<div class="kc org"><div class="kl">Alertas >24h</div><div class="kv" style="color:var(--org)">'+k.alertas_24h+'</div><div class="ki">🔔</div></div>'
+'<div class="kc pur"><div class="kl">Interditados</div><div class="kv" style="color:var(--pur)">'+Math.round(k.interditados_dias)+'</div><div class="ks">leito-dias</div><div class="ki">🚫</div></div></div>'
